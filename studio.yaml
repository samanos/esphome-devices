esphome:
  name: studio

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

i2c:
  sda: GPIO33
  scl: GPIO32
  scan: True

sensor:

  - platform: scd4x
    co2:
      name: "CO2 scd4x"
      filters:
        - median
    temperature:
      name: "Temperature scd4x"
      filters:
        - median
    humidity:
      name: "Humidity scd4x"
      filters:
        - median

  - platform: bme280_i2c
    temperature:
      name: "Temperature bme280"
      filters:
        - median
    pressure:
      name: "Pressure bme280"
      filters:
        - median
    humidity:
      name: "Humidity bme280"
      filters:
        - median
    address: 0x76
    update_interval: 60s

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

switch:
  - platform: restart
    name: "Restart"

logger:

api:

ota:
  platform: esphome
